<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>ClippyAI Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Consolas', 'Courier New', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      font-size: 12px;
      line-height: 1.5;
    }
    .toolbar {
      position: sticky;
      top: 0;
      background: #2d2d2d;
      border-bottom: 1px solid #444;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    .toolbar select, .toolbar button {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      background: #3c3c3c;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 3px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #505050; }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: #888; }
    #log-container {
      padding: 8px 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    /* Report dialog overlay */
    .report-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      /* Let clicks pass through the dark backdrop to the dialog below.
         The dialog itself re-enables pointer-events so its textarea,
         buttons, etc. are interactive. Without this, the overlay
         captures focus and the textarea becomes untypeable. */
      pointer-events: none;
    }
    .report-overlay.visible { display: flex; pointer-events: auto; }
    .report-dialog {
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 6px;
      width: min(520px, 90vw);
      padding: 18px 20px;
      color: #d4d4d4;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      /* Re-enable pointer events inside the dialog so textarea, buttons
         etc. all work. The overlay's pointer-events:none only affects
         the backdrop area outside this box. */
      pointer-events: auto;
      position: relative;
      z-index: 101;
    }
    .report-dialog h3 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 600;
    }
    .report-dialog p {
      margin: 0 0 12px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
    }
    .report-dialog textarea {
      width: 100%;
      min-height: 120px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 8px;
      font-family: inherit;
      font-size: 12px;
      resize: vertical;
      box-sizing: border-box;
    }
    .report-dialog textarea:focus { outline: 1px solid #4CAF50; border-color: #4CAF50; }
    .report-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }
    .report-actions button {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 14px;
      background: #3c3c3c;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 3px;
      cursor: pointer;
    }
    .report-actions button.primary {
      background: #e65100;
      border-color: #bf360c;
      color: white;
    }
    .report-actions button:hover { background: #505050; }
    .report-actions button.primary:hover { background: #f57c00; }
    .report-counter { font-size: 11px; color: #888; margin-top: 4px; text-align: right; }
    .log-line { padding: 1px 0; }
    .log-info { color: #4ec9b0; }
    .log-warn { color: #dcdcaa; }
    .log-error { color: #f44747; }
    .log-debug { color: #808080; }
  </style>
</head>
<body>
  <div class="toolbar">
    <select id="filter-level">
      <option value="all">All Levels</option>
      <option value="info">Info+</option>
      <option value="warn">Warn+</option>
      <option value="error">Errors Only</option>
    </select>
    <button id="btn-refresh">Refresh</button>
    <button id="btn-clear">Clear Log</button>
    <button id="btn-report" style="background:#e65100;border-color:#bf360c;">Report Issue</button>
    <div class="spacer"></div>
    <span class="status" id="status">Loading...</span>
  </div>
  <div id="log-container"></div>

  <!-- Report dialog -->
  <div class="report-overlay" id="report-overlay">
    <div class="report-dialog">
      <h3>Report an issue</h3>
      <p>Tell us what happened — what you asked Clippy to do, what went wrong, and when. The more detail, the faster we can fix it. Your logs are attached automatically.</p>
      <textarea
        id="report-description"
        placeholder="Example: Asked Clippy to open Paint and draw a square. Paint opened but nothing was drawn. Happened around 2pm."
        maxlength="4000"></textarea>
      <div class="report-counter"><span id="report-chars">0</span> / 4000</div>
      <div class="report-actions">
        <button id="btn-report-cancel">Cancel</button>
        <button id="btn-report-send" class="primary">Send Report</button>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('log-container');
    const filterLevel = document.getElementById('filter-level');
    const status = document.getElementById('status');
    let autoScroll = true;

    function colorize(line) {
      if (line.includes('[ERROR]')) return 'log-error';
      if (line.includes('[WARN]')) return 'log-warn';
      if (line.includes('[INFO]')) return 'log-info';
      if (line.includes('[DEBUG]')) return 'log-debug';
      return '';
    }

    function shouldShow(line) {
      const level = filterLevel.value;
      if (level === 'all') return true;
      if (level === 'error') return line.includes('[ERROR]');
      if (level === 'warn') return line.includes('[ERROR]') || line.includes('[WARN]');
      if (level === 'info') return !line.includes('[DEBUG]');
      return true;
    }

    async function loadLogs() {
      try {
        const content = await window.clippy.readLogFile();
        if (!content) {
          container.textContent = 'No log file found.';
          status.textContent = 'No logs';
          return;
        }
        const lines = content.split('\n');
        container.innerHTML = '';
        let shown = 0;
        for (const line of lines) {
          if (!line.trim()) continue;
          if (!shouldShow(line)) continue;
          const div = document.createElement('div');
          div.className = `log-line ${colorize(line)}`;
          div.textContent = line;
          container.appendChild(div);
          shown++;
        }
        status.textContent = `${shown} lines`;
        if (autoScroll) window.scrollTo(0, document.body.scrollHeight);
      } catch (err) {
        container.textContent = `Error reading logs: ${err}`;
      }
    }

    filterLevel.addEventListener('change', loadLogs);
    document.getElementById('btn-refresh').addEventListener('click', loadLogs);
    document.getElementById('btn-clear').addEventListener('click', async () => {
      await window.clippy.clearLogFile();
      loadLogs();
    });

    // Report dialog — open it, let user describe the issue, then submit
    const reportOverlay = document.getElementById('report-overlay');
    const reportDescription = document.getElementById('report-description');
    const reportChars = document.getElementById('report-chars');
    const btnReport = document.getElementById('btn-report');
    const btnReportSend = document.getElementById('btn-report-send');
    const btnReportCancel = document.getElementById('btn-report-cancel');

    function openReport() {
      reportDescription.value = '';
      reportChars.textContent = '0';
      reportOverlay.classList.add('visible');
      // Delay focus to let the overlay render first. Without this the
      // textarea can lose focus to the overlay on some Electron versions.
      setTimeout(() => {
        reportDescription.focus();
        // Belt-and-suspenders: some Electron builds need a click too
        reportDescription.click();
      }, 150);
    }
    function closeReport() {
      reportOverlay.classList.remove('visible');
    }

    btnReport.addEventListener('click', openReport);
    btnReportCancel.addEventListener('click', closeReport);
    reportDescription.addEventListener('input', () => {
      reportChars.textContent = reportDescription.value.length;
    });
    // Stop clicks INSIDE the dialog from bubbling to the overlay's
    // click-to-close handler. This prevents the overlay from stealing
    // focus away from the textarea during interaction.
    document.querySelector('.report-dialog').addEventListener('click', (e) => {
      e.stopPropagation();
    });
    reportOverlay.addEventListener('click', (e) => {
      if (e.target === reportOverlay) closeReport();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && reportOverlay.classList.contains('visible')) {
        closeReport();
      }
    });

    btnReportSend.addEventListener('click', async () => {
      btnReportSend.textContent = 'Sending...';
      btnReportSend.disabled = true;
      btnReportCancel.disabled = true;
      const description = reportDescription.value.trim();
      try {
        const content = await window.clippy.readLogFile();
        if (content) {
          await window.clippy.reportLogs(content, description);
          status.textContent = description
            ? 'Report sent with your description! Our team will review it.'
            : 'Report sent! Our team will review it.';
          closeReport();
        } else {
          status.textContent = 'No logs to report.';
        }
      } catch (err) {
        status.textContent = 'Failed to send report.';
      }
      btnReportSend.textContent = 'Send Report';
      btnReportSend.disabled = false;
      btnReportCancel.disabled = false;
    });

    // Auto-refresh every 3 seconds
    loadLogs();
    setInterval(loadLogs, 3000);

    // Detect manual scroll → pause auto-scroll
    window.addEventListener('scroll', () => {
      const atBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50;
      autoScroll = atBottom;
    });
  </script>
</body>
</html>

appId: ai.cloudana.clippyai
productName: ClippyAI
copyright: Copyright © 2026 Cloudana · ClippyAI
# Shown in the "File description" field of Properties → Details
buildVersion: 0.20.0.1
extraMetadata:
  description: ClippyAI — Your AI desktop buddy
  author:
    name: Cloudana
    email: hello@clippyai.app

win:
  target:
    - target: nsis
      arch: x64
  icon: build/icon.ico
  # Cert subject is "Amro Dabbas" — must match for SmartScreen trust attribution.
  publisherName: Amro Dabbas
  legalTrademarks: ClippyAI is a trademark of Cloudana.
  requestedExecutionLevel: asInvoker
  artifactName: ClippyAI-Setup-${version}.${ext}
  # === CODE SIGNING (Azure Trusted Signing) ===
  # Wired in v0.11.19. Cert profile: clippyai-cert.
  # Wrapper: build/signing/sign.js calls SignTool with the TrustedSigning DLib.
  # Auth: %USERPROFILE%\.azure\clippyai-signing-creds.json (gitignored) or
  # AZURE_TENANT_ID/AZURE_CLIENT_ID/AZURE_CLIENT_SECRET env vars (CI).
  signAndEditExecutable: true
  signingHashAlgorithms:
    - sha256
  sign: ./build/signing/sign.js
  forceCodeSigning: true
  verifyUpdateCodeSignature: true

nsis:
  # oneClick MUST be true for reliable auto-updates. The update loop bug:
  # oneClick:false + allowToChangeInstallationDirectory meant the NSIS
  # silent update (/S --updated) couldn't find the install path → installed
  # to a different directory → relaunched the OLD exe → loop.
  # VS Code, Slack, Discord all use oneClick for this exact reason.
  oneClick: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ClippyAI
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  uninstallDisplayName: ClippyAI — AI Desktop Buddy
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  include: build/installer.nsh

files:
  - out/**/*
  - assets/**/*
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme,README,*.d.ts,__tests__,test,tests,docs,doc}"
  - "!**/node_modules/*/*.map"

extraResources:
  - from: assets/scripts
    to: scripts
    filter:
      - "*.ps1"
  # v0.11.22 — Bundle ClawdCursor's app-specific guide JSONs (Outlook,
  # Excel, Slack, Edge, Discord, Spotify, etc.). Read at runtime by
  # src/main/guides.ts and injected into the model's screen-context
  # block when the active window's processName matches a guide. Lets
  # the model use known-good keyboard shortcuts (Ctrl+Enter to send in
  # Outlook) instead of trying to coordinate-click — which failed in
  # report fbfc636e... when the AI guessed Send was at (188, 187).
  - from: vendor/clawdcursor/guides
    to: clawdcursor-guides
    filter:
      - "*.json"
  # v0.17.0 — whisper.cpp + quantized base.en model for offline STT.
  # Total ~60 MB (~57 MB model, ~2.3 MB binaries). Used by src/main/stt.ts
  # which spawns whisper-cli.exe with the bundled model and a WAV file
  # recorded in the renderer via Web Audio API. Lives at runtime under
  # process.resourcesPath/whisper/.
  - from: vendor/whisper/bin
    to: whisper
    filter:
      - "*.exe"
      - "*.dll"
  - from: vendor/whisper/models
    to: whisper/models
    filter:
      - "*.bin"
  # brain/*.md removed from extraResources — GUIDANCE prompt assembly was
  # deleted in v0.8.0 when we moved identity/prompts server-side. The .md
  # files remain in the repo as documentation but are NOT bundled anymore.

# rcedit embeds the Clippy icon + ProductName/FileDescription into the inner
# ClippyAI.exe after electron-builder packs it. Without this the exe shows the
# default Electron icon and "Electron" in Windows taskbar/Alt-Tab. Disabled in
# v0.7.5 as a red-herring diagnostic; re-enabled here because the actual
# install failures were NSIS integrity / antivirus / browser cache issues
# unrelated to rcedit.
afterPack: scripts/after-pack.js

directories:
  output: release
  buildResources: build

publish:
  provider: github
  owner: AmrDab
  repo: clippyai-desktop

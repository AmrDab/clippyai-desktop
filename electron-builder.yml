appId: ai.cloudana.clippyai
productName: ClippyAI
copyright: Copyright © 2026 Cloudana · ClippyAI
# Shown in the "File description" field of Properties → Details
buildVersion: 0.10.8
extraMetadata:
  description: ClippyAI — Your AI desktop buddy
  author:
    name: Cloudana
    email: hello@clippyai.app

win:
  target:
    - target: nsis
      arch: x64
  icon: build/icon.ico
  # publisherName removed — causes auto-update signature check failures without code signing cert
  # Re-add when we have an EV code signing certificate
  # Used for VERSIONINFO resource (file description / product name)
  legalTrademarks: ClippyAI is a trademark of Cloudana.
  requestedExecutionLevel: asInvoker
  # File naming — clean, no spaces
  artifactName: ClippyAI-Setup-${version}.${ext}
  # rcedit embeds icon + product name into exe (works without code signing)
  signAndEditExecutable: false
  signingHashAlgorithms: []
  forceCodeSigning: false
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ClippyAI
  # Custom installer/uninstaller icons (same as app icon for brand consistency)
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # How the app shows in "Add or Remove Programs"
  uninstallDisplayName: ClippyAI — AI Desktop Buddy
  # Run the app automatically after install finishes (checkbox, default on)
  runAfterFinish: true
  # License page — skip for now (can add later)
  # license: build/LICENSE.txt
  # Branded names
  displayLanguageSelector: false
  menuCategory: ClippyAI
  # Clean slate on uninstall — removes config, license key, logs
  deleteAppDataOnUninstall: true
  # Custom NSIS macros: taskkill ClippyAI + PSBridge before install/uninstall
  # so auto-update never races with a still-alive process holding file locks.
  include: build/installer.nsh

files:
  - out/**/*
  - assets/**/*
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme,README,*.d.ts,__tests__,test,tests,docs,doc}"
  - "!**/node_modules/*/*.map"

extraResources:
  - from: assets/scripts
    to: scripts
    filter:
      - "*.ps1"
  # brain/*.md removed from extraResources — GUIDANCE prompt assembly was
  # deleted in v0.8.0 when we moved identity/prompts server-side. The .md
  # files remain in the repo as documentation but are NOT bundled anymore.

# rcedit embeds the Clippy icon + ProductName/FileDescription into the inner
# ClippyAI.exe after electron-builder packs it. Without this the exe shows the
# default Electron icon and "Electron" in Windows taskbar/Alt-Tab. Disabled in
# v0.7.5 as a red-herring diagnostic; re-enabled here because the actual
# install failures were NSIS integrity / antivirus / browser cache issues
# unrelated to rcedit.
afterPack: scripts/after-pack.js

directories:
  output: release
  buildResources: build

publish:
  provider: github
  owner: AmrDab
  repo: clippyai-desktop
